    <text x="132" y="342" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30">A behavioral routing layer for clearer,</text>
    <text x="132" y="384" fill="#cbd5e1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30">more useful AI collaboration.</text>
