      <stop stop-color="#1f2937"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#030712"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f6d365"/>
